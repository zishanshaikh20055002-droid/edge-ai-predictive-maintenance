<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edge AI Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #080c14;
      --panel:     #0d1525;
      --border:    #1a2a44;
      --accent:    #00d4ff;
      --green:     #00ff88;
      --orange:    #ff9500;
      --red:       #ff2d55;
      --text:      #ccd6f6;
      --muted:     #4a6080;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'Rajdhani', sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
      transition: background 0.6s ease;
    }

    /* scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,212,255,0.015) 2px,
        rgba(0,212,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* ── header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      border: 2px solid var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 0 14px rgba(0,212,255,0.3);
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
    }

    .conn-status {
      font-family: var(--mono);
      font-size: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
    }

    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .conn-dot.live { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse 1.5s infinite; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    /* ── mode buttons ── */
    .mode-bar {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-bottom: 28px;
    }

    .mode-btn {
      font-family: var(--sans);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 10px 28px;
      border-radius: 6px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--panel);
      position: relative;
      overflow: hidden;
    }

    .mode-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: currentColor;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .mode-btn:hover::after { opacity: 0.08; }

    .mode-btn.normal  { color: var(--green);  border-color: var(--green);  }
    .mode-btn.degrade { color: var(--orange); border-color: var(--orange); }
    .mode-btn.failure { color: var(--red);    border-color: var(--red);    }

    .mode-btn.active.normal  { background: var(--green);  color: #000; }
    .mode-btn.active.degrade { background: var(--orange); color: #000; }
    .mode-btn.active.failure { background: var(--red);    color: #fff; }

    /* ── grid layout ── */
    .grid {
      display: grid;
      grid-template-columns: 300px 1fr;
      grid-template-rows: auto auto;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ── panel ── */
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    .panel-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── RUL display ── */
    .rul-value {
      font-family: var(--mono);
      font-size: 72px;
      font-weight: 400;
      line-height: 1;
      color: var(--accent);
      text-shadow: 0 0 30px rgba(0,212,255,0.6);
      margin: 8px 0 4px;
      transition: color 0.5s, text-shadow 0.5s;
    }

    .rul-unit {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
    }

    /* ── status badge ── */
    .status-badge {
      display: inline-block;
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: 3px;
      padding: 8px 18px;
      border-radius: 6px;
      margin: 20px 0;
      border: 1px solid;
      transition: all 0.4s;
    }

    .status-badge.HEALTHY  { color: var(--green);  border-color: var(--green);  background: rgba(0,255,136,0.08); }
    .status-badge.WARNING  { color: var(--orange); border-color: var(--orange); background: rgba(255,149,0,0.08);  }
    .status-badge.CRITICAL { color: var(--red);    border-color: var(--red);    background: rgba(255,45,85,0.12);  animation: blink-badge 0.8s infinite; }
    .status-badge.WAITING  { color: var(--muted);  border-color: var(--muted);  background: transparent; }

    @keyframes blink-badge { 0%,100%{opacity:1} 50%{opacity:0.5} }

    /* ── sensor rows ── */
    .sensor-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 8px;
    }

    .sensor-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .sensor-label {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sensor-value {
      font-family: var(--mono);
      font-size: 14px;
      color: var(--text);
    }

    /* ── chart panel ── */
    .chart-panel {
      grid-column: 2;
      grid-row: 1 / 3;
    }

    .chart-wrap {
      position: relative;
      height: 100%;
      min-height: 340px;
    }

    /* ── stats bar ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 16px;
    }

    .stat-box {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      text-align: center;
    }

    .stat-val {
      font-family: var(--mono);
      font-size: 22px;
      color: var(--accent);
    }

    .stat-lbl {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 4px;
    }

    /* ── body alert states ── */
    body.alert-warning  { background: #130f00; }
    body.alert-critical { background: #13000a; animation: body-blink 0.9s infinite; }
    @keyframes body-blink { 0%,100%{opacity:1} 50%{opacity:0.85} }

    /* ── responsive ── */
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .chart-panel { grid-column: 1; grid-row: auto; }
      .rul-value { font-size: 52px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <div class="logo-icon">⚙️</div>
      <h1>Predictive Maintenance</h1>
    </div>
    <div class="conn-status">
      <div class="conn-dot" id="connDot"></div>
      <span id="connLabel">CONNECTING</span>
    </div>
  </header>

  <!-- Mode Control -->
  <div class="mode-bar">
    <button class="mode-btn normal  active" onclick="setMode('normal')" >✅ NORMAL</button>
    <button class="mode-btn degrade"         onclick="setMode('degrade')">⚠️ DEGRADE</button>
    <button class="mode-btn failure"         onclick="setMode('failure')">🔴 FAILURE</button>
  </div>

  <div class="grid">

    <!-- Left: RUL + Status -->
    <div class="panel">
      <div class="panel-label">Remaining Useful Life</div>
      <div class="rul-value" id="rul">---</div>
      <div class="rul-unit">CYCLES</div>
      <div class="status-badge WAITING" id="status">WAITING</div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="stat-val" id="minRul">--</div>
          <div class="stat-lbl">Min RUL</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="maxRul">--</div>
          <div class="stat-lbl">Max RUL</div>
        </div>
        <div class="stat-box">
          <div class="stat-val" id="stepCount">0</div>
          <div class="stat-lbl">Steps</div>
        </div>
      </div>
    </div>

    <!-- Chart -->
    <div class="panel chart-panel">
      <div class="panel-label">RUL Timeline</div>
      <div class="chart-wrap">
        <canvas id="rulChart"></canvas>
      </div>
    </div>

    <!-- Sensors -->
    <div class="panel">
      <div class="panel-label">Sensor Readings</div>
      <div class="sensor-grid">
        <div class="sensor-row">
          <span class="sensor-label">🌡 Process Temp</span>
          <span class="sensor-value" id="temp">--</span>
        </div>
        <div class="sensor-row">
          <span class="sensor-label">🌬 Air Temp</span>
          <span class="sensor-value" id="air">--</span>
        </div>
        <div class="sensor-row">
          <span class="sensor-label">⚙️ Torque</span>
          <span class="sensor-value" id="torque">--</span>
        </div>
        <div class="sensor-row">
          <span class="sensor-label">🛠 Tool Wear</span>
          <span class="sensor-value" id="wear">--</span>
        </div>
        <div class="sensor-row">
          <span class="sensor-label">🚀 Rot. Speed</span>
          <span class="sensor-value" id="speed">--</span>
        </div>
      </div>
    </div>

  </div><!-- /grid -->

<script>
  // ── Chart setup ──────────────────────────────────────────────
  const ctx = document.getElementById('rulChart').getContext('2d');
  const rulData   = [];
  const labels    = [];

  const chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [{
        label: 'RUL',
        data: rulData,
        borderColor: '#00d4ff',
        backgroundColor: 'rgba(0,212,255,0.06)',
        borderWidth: 2,
        pointRadius: 3,
        pointBackgroundColor: '#00d4ff',
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: '#0d1525',
          borderColor: '#1a2a44',
          borderWidth: 1,
          titleColor: '#00d4ff',
          bodyColor: '#ccd6f6',
          titleFont: { family: 'Share Tech Mono' },
          bodyFont:  { family: 'Share Tech Mono' }
        }
      },
      scales: {
        x: {
          grid:  { color: 'rgba(26,42,68,0.8)' },
          ticks: { color: '#4a6080', font: { family: 'Share Tech Mono', size: 10 } }
        },
        y: {
          grid:  { color: 'rgba(26,42,68,0.8)' },
          ticks: { color: '#4a6080', font: { family: 'Share Tech Mono', size: 10 } }
        }
      }
    }
  });

  // ── Stats tracking ───────────────────────────────────────────
  let minRul = Infinity, maxRul = -Infinity, stepCount = 0;

  // ── WebSocket ────────────────────────────────────────────────
  const ws = new WebSocket("ws://127.0.0.1:8000/ws");

  ws.onopen = () => {
    document.getElementById('connDot').classList.add('live');
    document.getElementById('connLabel').textContent = 'LIVE';
  };

  ws.onclose = () => {
    document.getElementById('connDot').classList.remove('live');
    document.getElementById('connLabel').textContent = 'DISCONNECTED';
  };

  ws.onerror = (e) => {
    console.error("WS error:", e);
    document.getElementById('connLabel').textContent = 'ERROR';
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    const rul    = data.RUL;
    const status = data.status;

    // ── RUL display ──
    document.getElementById('rul').textContent = rul.toFixed(1);

    // ── Status badge ──
    const statusEl = document.getElementById('status');
    statusEl.textContent  = status;
    statusEl.className    = `status-badge ${status}`;

    // ── RUL color ──
    const rulEl = document.getElementById('rul');
    if      (status === 'CRITICAL') { rulEl.style.color = '#ff2d55'; rulEl.style.textShadow = '0 0 30px rgba(255,45,85,0.6)'; }
    else if (status === 'WARNING')  { rulEl.style.color = '#ff9500'; rulEl.style.textShadow = '0 0 30px rgba(255,149,0,0.5)'; }
    else                            { rulEl.style.color = '#00d4ff'; rulEl.style.textShadow = '0 0 30px rgba(0,212,255,0.6)'; }

    // ── Body alert ──
    document.body.className = '';
    if      (status === 'CRITICAL') document.body.classList.add('alert-critical');
    else if (status === 'WARNING')  document.body.classList.add('alert-warning');

    // ── Sensors ──
    document.getElementById('temp').textContent   = data.temperature.toFixed(2);
    document.getElementById('air').textContent    = data.air_temperature.toFixed(2);
    document.getElementById('torque').textContent = data.torque.toFixed(2);
    document.getElementById('wear').textContent   = data.tool_wear.toFixed(2);
    document.getElementById('speed').textContent  = data.speed.toFixed(2);

    // ── Chart ──
    labels.push(data.step);
    rulData.push(rul);
    if (labels.length > 30) { labels.shift(); rulData.shift(); }
    chart.update();

    // ── Stats ──
    stepCount++;
    if (rul < minRul) minRul = rul;
    if (rul > maxRul) maxRul = rul;
    document.getElementById('stepCount').textContent = stepCount;
    document.getElementById('minRul').textContent    = minRul.toFixed(1);
    document.getElementById('maxRul').textContent    = maxRul.toFixed(1);
  };

  // ── Mode Control ─────────────────────────────────────────────
  let currentMode = 'normal';

  async function setMode(mode) {
    try {
      const res = await fetch(`http://127.0.0.1:8000/set_mode/${mode}`, {
        method: 'POST'
      });
      const json = await res.json();
      console.log('Mode set to:', json.mode);

      currentMode = mode;

      // Update active button styles
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`.mode-btn.${mode}`).classList.add('active');

    } catch (err) {
      console.error('Failed to set mode:', err);
    }
  }
</script>

</body>
</html>
