services:

  mosquitto:
    image: eclipse-mosquitto:2
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped

  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - RUNTIME_MODEL_MODE=${RUNTIME_MODEL_MODE:-tflite}
      - RUNTIME_MODEL_PATH=${RUNTIME_MODEL_PATH:-/app/models/model_cmapss_int8.tflite}
      - MC_PASSES=30
      - MC_NOISE_STD=0.01
      - ASYNC_RESAMPLE_HZ=2.0
      - ASYNC_MAX_BUFFER_SECONDS=180
      - RUL_CYCLE_MINUTES=2.0
      - ALARM_FAILURE_WARN=0.55
      - ALARM_FAILURE_CRIT=0.80
      - ALARM_TTF_WARN_HOURS=12.0
      - ALARM_TTF_CRIT_HOURS=6.0
      - RETRAIN_ENABLED=true
      - RETRAIN_CHECK_MINUTES=30
      - RETRAIN_MIN_COOLDOWN_MINUTES=120
      - RETRAIN_MIN_ROWS=250
      - RETRAIN_MIN_FEEDBACK=15
      - RETRAIN_MIN_CONFIDENCE=0.25
      - RETRAIN_REQUIRE_DRIFT=true
      - DRIFT_ZSCORE_THRESHOLD=1.5
      - DRIFT_WINDOW_ROWS=600
    restart: unless-stopped
    depends_on:
      - mosquitto
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  publisher:
    build: .
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MACHINE_ID=M1
      - PUBLISHER_MODE=${PUBLISHER_MODE:-replay}
      - PUBLISH_RATE=${PUBLISH_RATE:-1.0}
      - PUBLISH_START_STEP=${PUBLISH_START_STEP:-0}
    command: ["python", "-m", "src.mqtt_publisher"]
    restart: unless-stopped
    depends_on:
      - mosquitto

  hardware_bridge:
    build: .
    profiles: ["hardware"]
    environment:
      - PYTHONUNBUFFERED=1
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MACHINE_ID=M1
      - HARDWARE_BRIDGE_MODE=emulate
      # For serial mode: set HARDWARE_BRIDGE_MODE=serial-jsonl and SERIAL_PORT.
      # - SERIAL_PORT=/dev/ttyUSB0
      # - SERIAL_BAUD=115200
    command: ["python", "-m", "src.hardware_bridge"]
    restart: unless-stopped
    depends_on:
      - mosquitto

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"
    restart: unless-stopped
    depends_on:
      - app

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    depends_on:
      - prometheus

volumes:
  prometheus_data:
  grafana_data:
  mosquitto_data:
  mosquitto_log: